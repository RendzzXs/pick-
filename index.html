<!DOCTYPE html>
<html>
<head>
    <title>Dadu M123 - With History</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 30px;
        }
        input {
            padding: 10px;
            margin: 10px;
            width: 120px;
            font-size: 18px;
            text-align: center;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin: 5px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #666;
        }
        h1 {
            margin-bottom: 20px;
            color: #ffd700;
        }
        h2 {
            color: #ffd700;
            font-size: 20px;
            margin: 10px 0;
        }
        .hasil {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
        }
        .total {
            margin-top: 10px;
            font-size: 22px;
            color: #ffd700;
            font-weight: bold;
        }
        .flex-row {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .input-area {
            margin: 20px 0;
            background: #222;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .history-section {
            margin-top: 40px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .history-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .win-stats {
            color: #4CAF50;
            font-weight: bold;
        }
        .lose-stats {
            color: #f44336;
            font-weight: bold;
        }
        .history-list {
            max-height: 200px;
            overflow-y: auto;
            background: #222;
            border-radius: 5px;
            padding: 10px;
            text-align: left;
        }
        .history-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }
        .history-item.win {
            color: #4CAF50;
        }
        .history-item.lose {
            color: #f44336;
        }
        .history-item.seri {
            color: #ffd700;
        }
        .reset-btn {
            background: #dc3545;
            margin-top: 10px;
        }
        .reset-btn:hover {
            background: #c82333;
        }
        .fee-note {
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
        .input-group {
            margin: 15px 0;
        }
        .input-group label {
            display: block;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>🎲 DADU M123 🎲</h1>

    <div class="flex-row">
        <div>
            <h2>⚫ K (Kiri)</h2>
            <input type="number" id="k" placeholder="Contoh 24" value="24">
        </div>
        <div>
            <h2>⚪ B (Kanan)</h2>
            <input type="number" id="b" placeholder="Contoh 12" value="12">
        </div>
    </div>

    <div class="input-area">
        <h2>💰 Total Taruhan</h2>
        <input type="number" id="totalBet" placeholder="Total bet" value="100000">
        <div class="input-group">
            <label>Contoh: 1000 = Rp 1.000</label>
        </div>
    </div>

    <button onclick="hitung()">🔍 Hitung Pemenang</button>
    <button onclick="resetForm()">🔄 Reset Form</button>

    <div class="hasil" id="hasil"></div>
    <div class="total" id="totalDisplay"></div>

    <!-- HISTORY SECTION -->
    <div class="history-section">
        <h2>📊 HISTORY</h2>
        
        <div class="history-stats">
            <div class="win-stats" id="totalWin">WIN: Rp 0</div>
            <div class="lose-stats" id="totalLose">LOST: Rp 0</div>
        </div>

        <div class="history-list" id="historyList">
            <!-- History akan muncul di sini -->
            <div style="color: #666; text-align: center; padding: 10px;">Belum ada history</div>
        </div>

        <button onclick="clearHistory()" class="reset-btn">🗑️ Hapus History</button>
    </div>

    <div class="fee-note">
        * Kemenangan sudah dipotong 10% (fee)
    </div>

    <script>
        // Array untuk menyimpan history
        let historyData = [];
        let totalWinAmount = 0;
        let totalLoseAmount = 0;

        function formatRupiah(angka) {
            return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function hitung() {
            let k = parseInt(document.getElementById("k").value);
            let b = parseInt(document.getElementById("b").value);
            let totalBet = parseInt(document.getElementById("totalBet").value);
            let hasilText = "";
            let totalText = "";
            let hasilKategori = "";
            let jumlahNominal = 0;

            if (isNaN(k) || isNaN(b) || isNaN(totalBet)) {
                hasilText = "⚠️ Isi semua kolom dengan angka!";
                totalText = "";
            } else if (k < 1 || b < 1 || totalBet < 1) {
                hasilText = "⚠️ Angka harus lebih dari 0!";
                totalText = "";
            } else {
                // Hitung hasil
                if (k > b) {
                    hasilText = "🔥 WIN K 🔥";
                    jumlahNominal = totalBet * 0.9; // Kemenangan setelah fee
                    totalText = `💰 Anda menang: ${formatRupiah(jumlahNominal)}`;
                    hasilKategori = "WIN";
                    
                    // Update total win
                    totalWinAmount += jumlahNominal;
                    
                } else if (b > k) {
                    hasilText = "🔥 WIN B 🔥";
                    jumlahNominal = totalBet * 0.9; // Kemenangan setelah fee
                    totalText = `💰 Anda menang: ${formatRupiah(jumlahNominal)}`;
                    hasilKategori = "WIN";
                    
                    // Update total win
                    totalWinAmount += jumlahNominal;
                    
                } else {
                    hasilText = "⚖ SERI ⚖";
                    jumlahNominal = totalBet; // Uang kembali
                    totalText = `🔄 Uang kembali: ${formatRupiah(jumlahNominal)}`;
                    hasilKategori = "SERI";
                    
                    // Seri tidak masuk hitungan win/lost
                }

                // Simpan ke history (hanya jika menang/kalah, seri tidak dihitung win/lost)
                let historyEntry = {
                    waktu: new Date().toLocaleTimeString('id-ID'),
                    k: k,
                    b: b,
                    bet: totalBet,
                    hasil: hasilKategori,
                    nominal: jumlahNominal,
                    keterangan: hasilText
                };
                
                historyData.unshift(historyEntry); // Tambah di awal
                
                // Update total lose jika kalah? (di sini kita hitung lost dari bet yang kalah)
                // Tapi karena di game ini tidak ada istilah kalah (hanya menang atau seri),
                // maka LOST bisa diartikan sebagai total bet yang kalah = 0
                // Sesuai request: LOST : {total} - mungkin menampilkan total kekalahan?
                // Kita asumsikan LOST = 0 karena tidak ada istilah kalah di game ini
                // Tapi jika mau menghitung lost dari bet, bisa diubah sesuai kebutuhan
                
                // Untuk demo, kita set totalLoseAmount = 0
                // totalLoseAmount tetap 0
            }

            document.getElementById("hasil").innerText = hasilText;
            document.getElementById("totalDisplay").innerText = totalText;
            
            // Update tampilan history
            tampilkanHistory();
        }

        function tampilkanHistory() {
            // Update total win dan lose
            document.getElementById("totalWin").innerHTML = `WIN: ${formatRupiah(totalWinAmount)}`;
            document.getElementById("totalLose").innerHTML = `LOST: ${formatRupiah(totalLoseAmount)}`;
            
            // Tampilkan list history
            let historyHtml = "";
            
            if (historyData.length === 0) {
                historyHtml = '<div style="color: #666; text-align: center; padding: 10px;">Belum ada history</div>';
            } else {
                historyData.forEach(item => {
                    let kelas = "";
                    if (item.hasil === "WIN") kelas = "win";
                    else if (item.hasil === "SERI") kelas = "seri";
                    
                    historyHtml += `
                        <div class="history-item ${kelas}">
                            [${item.waktu}] ${item.keterangan} | K:${item.k} B:${item.b} | Bet: ${formatRupiah(item.bet)} → ${formatRupiah(item.nominal)}
                        </div>
                    `;
                });
            }
            
            document.getElementById("historyList").innerHTML = historyHtml;
        }

        function resetForm() {
            document.getElementById("k").value = "24";
            document.getElementById("b").value = "12";
            document.getElementById("totalBet").value = "100000";
            document.getElementById("hasil").innerText = "";
            document.getElementById("totalDisplay").innerText = "";
        }

        function clearHistory() {
            historyData = [];
            totalWinAmount = 0;
            totalLoseAmount = 0;
            tampilkanHistory();
        }

        // Format input number dengan titik (tambahan)
        document.getElementById('totalBet').addEventListener('input', function(e) {
            // Ini hanya untuk display, value aslinya tetap number
            // Biarkan saja, format dilakukan di fungsi formatRupiah
        });
    </script>

</body>
</html>
